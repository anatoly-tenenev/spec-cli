version: "0.0.7"
entity:
  feature:
    idPrefix: FEAT
    pathTemplate: "features/{slug}.md"
    meta:
      fields:
        owner:
          schema:
            type: entityRef
            refType: [service]
  service:
    idPrefix: SVC
    pathTemplate: "services/{slug}.md"
    meta:
      fields:
        owner:
          schema:
            type: string
