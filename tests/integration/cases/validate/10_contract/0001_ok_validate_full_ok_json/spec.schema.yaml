version: "0.0.3"
entity:
  doc:
    id_prefix: DOC
    path_pattern: "{slug}.md"
    meta:
      fields:
        owner:
          schema:
            type: string
            enum:
              - platform
              - core
        priority:
          schema:
            type: integer
        status:
          schema:
            type: string
            const: approved
    content:
      sections:
        goal: {}
        scope: {}
