version: "0.0.3"
entity:
  doc:
    id_prefix: DOC
    path_pattern:
      cases:
        - when:
            eq?: [meta.created_date, "2026-03-01"]
          use: "entity_a.md"
        - use: "entity_b.md"
    meta:
      fields:
        owner:
          schema:
            type: string
            enum:
              - platform
              - core
        priority:
          schema:
            type: integer
        status:
          schema:
            type: string
            const: approved
    content:
      sections:
        goal: {}
        scope: {}
