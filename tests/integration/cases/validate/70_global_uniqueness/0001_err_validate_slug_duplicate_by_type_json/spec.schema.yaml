version: "0.0.4"
entity:
  doc:
    idPrefix: DOC
    pathTemplate:
      cases:
        - when: "${createdDate == '2026-03-01'}"
          use: "entity_a.md"
        - use: "entity_b.md"
    meta:
      fields:
        owner:
          schema:
            type: string
            enum:
              - platform
              - core
        priority:
          schema:
            type: integer
        status:
          schema:
            type: string
            const: approved
    content:
      sections:
        goal: {}
        scope: {}
