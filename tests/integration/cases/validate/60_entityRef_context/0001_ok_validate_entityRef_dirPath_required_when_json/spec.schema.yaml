version: "0.0.4"
entity:
  service:
    idPrefix: SRV
    pathTemplate: "services/${slug}/index.md"
    meta:
      fields:
        tier:
          schema:
            type: string
            enum:
              - core
              - edge
    content:
      sections:
        goal: {}
  feature:
    idPrefix: FEAT
    pathTemplate:
      cases:
        - when: "${refs.owner != `null`}"
          use: "${refs.owner.dirPath}/features/${slug}.md"
        - use: "features/${slug}.md"
    meta:
      fields:
        owner:
          required: false
          schema:
            type: entityRef
            refType: [service]
        owner_slug:
          required: "${refs.owner.type == 'service'}"
          schema:
            type: string
            const: api
    content:
      sections:
        goal: {}
