version: "0.0.4"
entity:
  service:
    idPrefix: SRV
    pathTemplate: "services/${slug}.md"
    content:
      sections:
        goal: {}
  domain:
    idPrefix: DOM
    pathTemplate: "domains/${slug}.md"
    content:
      sections:
        goal: {}
  feature:
    idPrefix: FEAT
    pathTemplate: "features/${slug}.md"
    meta:
      fields:
        owner:
          required: false
          schema:
            type: entityRef
            refType: [service]
        owners:
          required: false
          schema:
            type: array
            items:
              type: entityRef
              refType: [service]
    content:
      sections:
        goal: {}
