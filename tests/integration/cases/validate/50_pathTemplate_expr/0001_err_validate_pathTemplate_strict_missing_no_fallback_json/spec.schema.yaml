version: "0.0.7"
entity:
  doc:
    idPrefix: DOC
    pathTemplate:
      cases:
        - when: "${`null`}"
          use: "core/${slug}.md"
        - use: "misc/${slug}.md"
    meta:
      fields:
        owner:
          required: false
          schema:
            type: string
            enum:
              - core
              - platform
    content:
      sections:
        goal: {}
