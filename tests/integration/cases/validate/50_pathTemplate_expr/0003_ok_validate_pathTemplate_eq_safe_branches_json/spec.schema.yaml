version: "0.0.4"
entity:
  doc:
    idPrefix: DOC
    pathTemplate:
      cases:
        - when:
            eq?: [meta.owner, "core"]
          use: "core/{slug}.md"
        - use: "misc/{slug}.md"
    meta:
      fields:
        owner:
          required: false
          schema:
            type: string
            enum:
              - core
              - platform
    content:
      sections:
        goal: {}
