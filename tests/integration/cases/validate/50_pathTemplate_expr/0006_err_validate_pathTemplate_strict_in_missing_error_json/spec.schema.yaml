version: "0.0.4"
entity:
  doc:
    idPrefix: DOC
    pathTemplate: "misc/${slug}.md"
    meta:
      fields:
        owner:
          required: false
          schema:
            type: string
            enum: [core, edge]
        owner_snapshot:
          required: false
          schema:
            type: string
            const: "${meta}"
    content:
      sections:
        goal: {}
