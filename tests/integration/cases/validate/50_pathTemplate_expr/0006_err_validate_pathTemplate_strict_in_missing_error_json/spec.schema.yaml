version: "0.0.4"
entity:
  doc:
    idPrefix: DOC
    pathTemplate:
      cases:
        - when:
            in: [meta.owner, [core, edge]]
          use: "core/{slug}.md"
        - use: "misc/{slug}.md"
    meta:
      fields:
        owner:
          required: false
          schema:
            type: string
            enum: [core, edge]
    content:
      sections:
        goal: {}
