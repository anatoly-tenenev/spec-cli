version: 0.0.4
entity:
  doc:
    idPrefix: "DOC"
    pathTemplate:
      cases:
        - when: "${meta.owner != `null`}"
          use: "docs/${refs.owner.id}/${slug}.md"
        - use: "${slug}.md"
    meta:
      fields:
        owner:
          required: false
          schema:
            type: entityRef
