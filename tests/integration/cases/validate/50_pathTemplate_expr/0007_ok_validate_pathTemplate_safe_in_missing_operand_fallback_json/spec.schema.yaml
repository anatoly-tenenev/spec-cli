version: "0.0.7"
entity:
  doc:
    idPrefix: DOC
    pathTemplate:
      cases:
        - when: "${contains(['core', 'edge'], meta.owner)}"
          use: "core/${slug}.md"
        - use: "misc/${slug}.md"
    meta:
      fields:
        owner:
          required: false
          schema:
            type: string
            enum: [core, edge]
    content:
      sections:
        goal: {}
