version: "0.0.3"
entity:
  doc:
    id_prefix: DOC
    path_pattern:
      cases:
        - when:
            eq: [meta.owner, "core"]
          use: "core/{slug}.md"
        - use: "misc/{slug}.md"
    meta:
      fields:
        - name: owner
          required: false
          schema:
            type: string
            enum:
              - core
              - platform
    content:
      sections:
        - name: goal
