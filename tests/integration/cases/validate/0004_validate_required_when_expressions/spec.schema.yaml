version: "0.0.3"
entity:
  doc:
    id_prefix: DOC
    path_pattern:
      cases:
        - when:
            eq?: [meta.owner, "core"]
          use: "core/{slug}.md"
        - use: "misc/{slug}.md"
    meta:
      fields:
        - name: status
          schema:
            type: string
            enum:
              - draft
              - approved
        - name: owner
          required: false
          schema:
            type: string
            enum:
              - core
              - platform
        - name: test_file
          required: false
          required_when:
            in: [meta.status, [approved]]
          schema:
            type: string
    content:
      sections:
        - name: goal
        - name: scope
          required: false
          required_when:
            eq?: [meta.status, "approved"]
