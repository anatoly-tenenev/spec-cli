version: 0.0.4
entity:
  doc:
    idPrefix: "DOC"
    pathTemplate: "{slug}.md"
    meta:
      fields:
        owner:
          required: false
          schema:
            type: string
            enum: [core, edge]
        reviewer:
          required: false
          required_when:
            eq: [meta.owner, core]
          schema:
            type: string
            enum: [ops]
