version: 0.0.4
entity:
  doc:
    idPrefix: "DOC"
    pathTemplate: "${slug}.md"
    meta:
      fields:
        owner:
          required: false
          schema:
            type: string
            enum: [core, edge]
        reviewer:
          required: "${meta.owner == 'core' && meta.__missing__}"
          schema:
            type: string
            enum: [ops]
