version: 0.0.2
entity:
  doc:
    id_prefix: "DOC"
    path_pattern: "{slug}.md"
    meta:
      fields:
        owner:
          required: false
          schema:
            type: string
            enum: [core, edge]
        reviewer:
          required: false
          required_when:
            eq: [meta.owner, core]
          schema:
            type: string
            enum: [ops]
