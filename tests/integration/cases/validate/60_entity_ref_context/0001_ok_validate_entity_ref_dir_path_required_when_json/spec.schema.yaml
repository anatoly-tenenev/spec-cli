version: "0.0.4"
entity:
  service:
    id_prefix: SRV
    path_pattern: "services/{slug}/index.md"
    meta:
      fields:
        tier:
          schema:
            type: string
            enum:
              - core
              - edge
    content:
      sections:
        goal: {}
  feature:
    id_prefix: FEAT
    path_pattern:
      cases:
        - when:
            exists: refs.owner
          use: "{refs.owner.dir_path}/features/{slug}.md"
        - use: "features/{slug}.md"
    meta:
      fields:
        owner:
          required: false
          schema:
            type: entity_ref
            refTypes: [service]
        owner_slug:
          required: false
          required_when:
            eq?: [refs.owner.type, "service"]
          schema:
            type: string
            const: api
    content:
      sections:
        goal: {}
