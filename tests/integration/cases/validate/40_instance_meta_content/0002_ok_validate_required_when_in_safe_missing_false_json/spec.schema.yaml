version: "0.0.4"
entity:
  doc:
    id_prefix: DOC
    path_pattern: "{slug}.md"
    meta:
      fields:
        owner:
          required: false
          schema:
            type: string
            enum:
              - core
              - platform
        checklist:
          required: false
          required_when:
            in?: [meta.owner, [core]]
          schema:
            type: string
    content:
      sections:
        goal: {}
