version: "0.0.4"
entity:
  doc:
    idPrefix: DOC
    pathTemplate: "${slug}.md"
    meta:
      fields:
        owner:
          required: false
          schema:
            type: string
            enum:
              - core
              - platform
        checklist:
          required: "${contains(['core'], meta.owner)}"
          schema:
            type: string
    content:
      sections:
        goal: {}
