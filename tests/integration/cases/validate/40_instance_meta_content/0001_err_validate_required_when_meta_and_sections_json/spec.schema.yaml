version: "0.0.4"
entity:
  doc:
    idPrefix: DOC
    pathTemplate:
      cases:
        - when: "${meta.owner == 'core'}"
          use: "core/${slug}.md"
        - use: "misc/${slug}.md"
    meta:
      fields:
        status:
          schema:
            type: string
            enum:
              - draft
              - approved
        owner:
          required: false
          schema:
            type: string
            enum:
              - core
              - platform
        test_file:
          required: "${contains(['approved'], meta.status)}"
          schema:
            type: string
    content:
      sections:
        goal: {}
        scope:
          required: "${meta.status == 'approved'}"
