version: "0.0.4"
entity:
  doc:
    id_prefix: DOC
    path_pattern:
      cases:
        - when:
            eq?: [meta.owner, "core"]
          use: "core/{slug}.md"
        - use: "misc/{slug}.md"
    meta:
      fields:
        status:
          schema:
            type: string
            enum:
              - draft
              - approved
        owner:
          required: false
          schema:
            type: string
            enum:
              - core
              - platform
        test_file:
          required: false
          required_when:
            in: [meta.status, [approved]]
          schema:
            type: string
    content:
      sections:
        goal: {}
        scope:
          required: false
          required_when:
            eq?: [meta.status, "approved"]
