version: "0.0.4"
entity:
  doc:
    id_prefix: DOC
    path_pattern: "docs/{slug}.md"
    meta:
      fields:
        profile:
          required: true
          schema:
            type: string
            enum: [core, edge, platform]
        flag:
          required: true
          schema:
            type: boolean
        owner:
          required: false
          required_when:
            all:
              - any:
                  - eq?: [meta.profile, "core"]
                  - eq?: [meta.profile, "edge"]
              - not:
                  eq?: [meta.flag, true]
          schema:
            type: string
    content:
      sections:
        goal: {}
