version: "0.0.4"
entity:
  doc:
    idPrefix: DOC
    pathTemplate: "docs/${slug}.md"
    meta:
      fields:
        profile:
          required: true
          schema:
            type: string
            enum: [core, edge, platform]
        flag:
          required: true
          schema:
            type: boolean
        owner:
          required: "${contains(['core', 'edge'], meta.profile) && !(meta.flag == `true`)}"
          schema:
            type: string
    content:
      sections:
        goal: {}
