version: "0.0.7"
entity:
  doc:
    idPrefix: DOC
    pathTemplate: "docs/${slug}.md"
    meta:
      fields:
        tags:
          required: true
          schema:
            type: array
            items:
              type: string
            uniqueItems: true
            minItems: 2
            maxItems: 3
    content:
      sections:
        goal: {}
