version: 0.0.4
entity:
  doc:
    id_prefix: "DOC"
    path_pattern:
      cases:
        - when:
            exists: meta.owner
          use: "docs/{refs.owner.id}/{slug}.md"
        - use: "{slug}.md"
    meta:
      fields:
        owner:
          required: false
          schema:
            type: entity_ref
