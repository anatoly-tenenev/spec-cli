version: "0.0.4"
entity:
  person:
    idPrefix: PER
    pathTemplate: "people/${slug}.md"
    meta:
      fields:
        name:
          required: true
          schema:
            type: string
    content:
      sections:
        summary:
          required: true
          title: "Summary"
  feature:
    idPrefix: FEAT
    pathTemplate: "features/${slug}.md"
    meta:
      fields:
        owner:
          required: true
          schema:
            type: entityRef
            refType: [person]
        status:
          required: true
          schema:
            type: string
            enum: [draft, "${refs.owner.slug}"]
    content:
      sections:
        summary:
          required: true
          title: "Summary"