version: "0.0.4"
entity:
  service:
    idPrefix: SVC
    pathTemplate: "services/${slug}/index.md"
    meta:
      fields:
        owner:
          required: true
          schema:
            type: string
        dirPath:
          required: false
          schema:
            type: string
    content:
      sections:
        summary:
          required: true
          title: "Summary"
  feature:
    idPrefix: FEAT
    pathTemplate:
      cases:
        - when: ${refs.container.dirPath}
          use: "${refs.container.dirPath}/features/${slug}.md"
        - use: "features/${slug}.md"
    meta:
      fields:
        status:
          required: true
          schema:
            type: string
            enum: [draft, active, deprecated]
        container:
          required: true
          schema:
            type: entityRef
            refType: service
        priority:
          required: false
          schema:
            type: integer
        enabled:
          required: false
          schema:
            type: boolean
        literal_code:
          required: false
          schema:
            type: string
        literal_word:
          required: false
          schema:
            type: string
    content:
      sections:
        summary:
          required: true
          title: "Summary"
        implementation:
          required: false
          title: "Implementation"
  note:
    idPrefix: NOTE
    pathTemplate: "notes/${slug}.md"
    meta:
      fields:
        title:
          required: true
          schema:
            type: string
