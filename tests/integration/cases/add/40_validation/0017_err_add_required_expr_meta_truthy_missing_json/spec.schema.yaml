version: "0.0.7"
entity:
  note:
    idPrefix: NOTE
    pathTemplate: "notes/${slug}.md"
    meta:
      fields:
        trigger:
          required: false
          schema:
            type: string
        owner:
          required: "${meta.trigger}"
          schema:
            type: string
    content:
      sections:
        summary:
          required: "${meta.trigger}"
          title: "Summary"