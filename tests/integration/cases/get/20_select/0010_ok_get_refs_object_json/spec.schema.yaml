version: "0.0.7"
entity:
  service:
    idPrefix: SVC
    pathTemplate: "services/{slug}.md"
    meta:
      fields:
        status:
          schema:
            type: string
            enum: [active, deprecated]
        tier:
          schema:
            type: integer
    content:
      sections:
        summary: {}

  feature:
    idPrefix: FEAT
    pathTemplate: "features/{slug}.md"
    meta:
      fields:
        status:
          schema:
            type: string
            enum: [draft, active, deprecated]
        container:
          schema:
            type: entityRef
            refType: [service]
        backup_container:
          schema:
            type: entityRef
            refType: [service]
        score:
          schema:
            type: number
    content:
      sections:
        summary: {}
        implementation: {}
