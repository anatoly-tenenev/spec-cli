version: "0.0.4"
entity:
  service:
    id_prefix: SVC
    path_pattern: "services/{slug}.md"
    meta:
      fields:
        status:
          schema:
            type: string
            enum: [active, deprecated]

  feature:
    id_prefix: FEAT
    path_pattern: "features/{slug}.md"
    meta:
      fields:
        status:
          schema:
            type: string
            enum: [draft, active, deprecated]
        owner:
          schema:
            type: entity_ref
            refTypes: [service]
