version: "0.0.7"
entity:
  service:
    idPrefix: SVC
    pathTemplate: "services/${slug}/index.md"
    meta:
      fields:
        dirPath:
          required: true
          schema:
            type: string
    content:
      sections:
        summary:
          required: true
          title: "Summary"
  feature:
    idPrefix: FEAT
    pathTemplate:
      cases:
        - when: ${refs.container.dirPath}
          use: "${refs.container.dirPath}/features/${slug}.md"
        - use: "features/${slug}.md"
    meta:
      fields:
        status:
          required: true
          schema:
            type: string
            enum: [draft, active, deprecated]
        container:
          required: true
          schema:
            type: entityRef
            refType: [service]
        tags:
          required: false
          schema:
            type: array
            items:
              type: string
            minItems: 1
            maxItems: 2
            uniqueItems: true
        watchers:
          required: false
          schema:
            type: array
            items:
              type: entityRef
              refType: [service]
    content:
      sections:
        summary:
          required: true
          title: "Summary"