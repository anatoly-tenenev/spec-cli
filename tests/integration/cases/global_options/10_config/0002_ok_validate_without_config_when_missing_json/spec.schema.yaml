version: "0.0.4"
entity:
  doc:
    idPrefix: DOC
    pathTemplate: "{slug}.md"
    meta:
      fields:
        owner:
          schema:
            type: string
            enum:
              - platform
              - core
        priority:
          schema:
            type: integer
        status:
          schema:
            type: string
            const: approved
    content:
      sections:
        goal: {}
        scope: {}
