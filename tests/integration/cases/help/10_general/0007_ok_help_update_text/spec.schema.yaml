version: "0.0.4"
description: Workspace specification schema
entity:
  feature:
    description: Feature specifications
    idPrefix: FEAT
    pathTemplate: "features/{slug}.md"
    meta:
      fields:
        status:
          description: Lifecycle status
          required: false
          schema:
            type: string
            enum:
              - draft
              - active
              - deprecated
        watchers:
          description: Related services
          schema:
            type: array
            items:
              type: entityRef
              refTypes:
                - service
        owner:
          description: Parent service
          required: ${meta.status == 'active'}
          schema:
            type: entityRef
            refTypes:
              - service
    content:
      sections:
        summary:
          description: Short summary
          required: ${meta.status == 'active'}
          title: Summary
  service:
    idPrefix: SVC
    pathTemplate: "services/{slug}.md"
    meta:
      fields:
        tier:
          required: true
          schema:
            type: string
