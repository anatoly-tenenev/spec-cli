version: v1
entity:
  service:
    idPrefix: DUP
    pathTemplate:
      cases:
        - when: "${meta.slug == 'x'}"
    meta:
      fields:
        type:
          schema:
            type: string
        owner:
          schema:
            type: entityRef
            refType: [unknown, unknown]
  feature:
    idPrefix: DUP
    pathTemplate: features/${meta.slug}.md
