version: "0.0.7"
entity:
  service:
    idPrefix: SVC
    pathTemplate: "services/{slug}.md"

  team:
    idPrefix: TEAM
    pathTemplate: "teams/{slug}.md"

  feature:
    idPrefix: FEAT
    pathTemplate: "features/{slug}.md"
    meta:
      fields:
        status:
          schema:
            type: string
            enum: [draft, active, archived]
        owner:
          schema:
            type: entityRef
            refType: service
        watchers:
          schema:
            type: array
            items:
              type: entityRef
        score:
          schema:
            type: number
        dueDate:
          schema:
            type: string
            format: date
        tags:
          schema:
            type: array
            items:
              type: string
        priority:
          schema:
            type: string
    content:
      sections:
        summary:
          description: Summary
        details:
          description: Details
