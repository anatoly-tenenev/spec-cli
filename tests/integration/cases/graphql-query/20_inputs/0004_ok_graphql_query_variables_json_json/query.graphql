query ActiveByInlineVariables($status: FeatureStatus!, $limit: Int!, $offset: Int!) {
  activeByInlineVariables: feature(
    where: { meta: { status: { eq: $status } } }
    limit: $limit
    offset: $offset
  ) {
    items { id slug }
    totalCount
    pageInfo { limit offset returned hasMore nextOffset }
  }
}
